name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  dmg:
    # macos-latest = Apple Silicon (runners sempre disponíveis).
    # Usamos Rosetta para instalar Python x86_64 e gerar binário Intel.
    # O DMG resultante funciona em MacBooks Intel 2013-2020.
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true

      - name: Instalar Homebrew x86_64 (Intel)
        run: |
          if [ ! -f /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" \
              < /dev/null
          fi

      - name: Instalar Python 3.12 x86_64 via Homebrew Intel
        run: |
          arch -x86_64 /usr/local/bin/brew install python@3.12 || \
          arch -x86_64 /usr/local/bin/brew upgrade python@3.12 || true
          arch -x86_64 /usr/local/bin/python3.12 --version

      - name: Instalar dependências (x86_64)
        working-directory: SAFX_Editor
        run: |
          arch -x86_64 /usr/local/bin/python3.12 -m pip install --upgrade pip --quiet
          arch -x86_64 /usr/local/bin/python3.12 -m pip install -r requirements.txt --quiet
          arch -x86_64 /usr/local/bin/python3.12 -m pip install -r packaging/requirements-build.txt --quiet

      - name: PyInstaller x86_64 (Intel)
        working-directory: SAFX_Editor
        run: |
          arch -x86_64 /usr/local/bin/python3.12 -m PyInstaller --clean --noconfirm SAFX_Editor.spec

      - name: Criar DMG
        working-directory: SAFX_Editor
        run: |
          mkdir -p release
          STAGE=$(mktemp -d)
          cp -R "dist/SAFX_Editor.app" "$STAGE/SAFX_Editor.app"
          ln -s /Applications "$STAGE/Applications"
          DMG="release/SAFX_Editor_macos.dmg"
          rm -f "$DMG"
          hdiutil create -volname "SAFX Editor" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          rm -rf "$STAGE"
          echo "DMG: $(du -h $DMG | cut -f1)"

      - name: Upload para Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SAFX Editor ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: SAFX_Editor/release/SAFX_Editor_macos.dmg
          body: |
            ## SAFX Editor ${{ github.ref_name }}

            ### Instalar no Mac (Intel 2013-2020)
            1. Descarregue **SAFX_Editor_macos.dmg**
            2. Abra com duplo clique
            3. Arraste **SAFX_Editor** para a pasta **Aplicativos**
            4. Abra pelo Launchpad

            ### Instalar no Windows
            1. Descarregue **SAFX_Editor_Setup.exe**
            2. Execute e clique em **Avancar** ate concluir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
