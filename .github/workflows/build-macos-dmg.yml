name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build DMG
        run: python3 SAFX_Editor/build_dmg_mac.py

      - name: Cria Release e faz upload do DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "SAFX Editor v1.0.0"
          draft: false
          prerelease: false
          files: SAFX_Editor/release/SAFX_Editor_macos.dmg
          body: |
            ## SAFX Editor v1.0.0 — macOS

            ### Como instalar no Mac
            1. Descarregue **SAFX_Editor_macos.dmg**
            2. Abra com duplo clique
            3. Arraste **SAFX_Editor** para a pasta **Aplicativos**
            4. Abra pelo Launchpad
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
