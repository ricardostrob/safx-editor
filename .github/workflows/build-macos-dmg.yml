name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  dmg:
    # macos-13 = runner Intel x86_64 (compatível com MacBook 2018 e anteriores)
    # macos-14 = runner Apple Silicon ARM (INCOMPATÍVEL com Intel Macs)
    runs-on: macos-13
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build DMG
        run: python3 SAFX_Editor/build_dmg_mac.py

      - name: Cria Release e faz upload do DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SAFX Editor ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: SAFX_Editor/release/SAFX_Editor_macos.dmg
          body: |
            ## SAFX Editor ${{ github.ref_name }}

            ### Instalar no Mac (Intel 2015–2020)
            1. Descarregue **SAFX_Editor_macos.dmg**
            2. Abra com duplo clique
            3. Arraste **SAFX_Editor** para a pasta **Aplicativos**
            4. Abra pelo Launchpad

            ### Instalar no Windows
            1. Descarregue **SAFX_Editor_Setup.exe**
            2. Execute e clique **Avançar** até concluir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
