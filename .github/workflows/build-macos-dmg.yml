name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  dmg:
    # macos-latest = Apple Silicon (rápido, disponível imediatamente)
    # PyInstaller compila com --target-arch universal2 = funciona em Intel E Apple Silicon
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        working-directory: SAFX_Editor
        env:
          PYTHONUTF8: "1"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r packaging/requirements-build.txt

      - name: Gerar assets de branding
        working-directory: SAFX_Editor
        env:
          PYTHONUTF8: "1"
        run: python packaging/branding/build_assets.py --dmg-only || true

      - name: PyInstaller — universal2 (Intel + Apple Silicon)
        working-directory: SAFX_Editor
        env:
          PYTHONUTF8: "1"
        run: |
          pyinstaller --clean --noconfirm SAFX_Editor.spec

      - name: Criar DMG com hdiutil
        working-directory: SAFX_Editor
        run: |
          mkdir -p release
          STAGE=$(mktemp -d)
          cp -R "dist/SAFX_Editor.app" "$STAGE/SAFX_Editor.app"
          ln -s /Applications "$STAGE/Applications"
          DMG="release/SAFX_Editor_macos.dmg"
          rm -f "$DMG"
          hdiutil create \
            -volname "SAFX Editor" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "$DMG"
          rm -rf "$STAGE"
          echo "DMG criado: $(du -h $DMG | cut -f1)"

      - name: Upload para Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SAFX Editor ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: SAFX_Editor/release/SAFX_Editor_macos.dmg
          body: |
            ## SAFX Editor ${{ github.ref_name }}

            ### Instalar no Mac (Intel 2013–2020 e Apple Silicon M1/M2/M3)
            1. Descarregue **SAFX_Editor_macos.dmg**
            2. Abra com duplo clique
            3. Arraste **SAFX_Editor** para a pasta **Aplicativos**
            4. Abra pelo Launchpad

            ### Instalar no Windows
            1. Descarregue **SAFX_Editor_Setup.exe**
            2. Execute e clique **Avançar** até concluir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
